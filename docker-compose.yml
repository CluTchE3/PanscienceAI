version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: task_db
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task_backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/task-manager
      - JWT_SECRET=supersecretjwtkey_change_in_production
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task_frontend
    ports:
      - '3000:3000'
    environment:
      - VITE_API_TARGET=http://backend:5000
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
